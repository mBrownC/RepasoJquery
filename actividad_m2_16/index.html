<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Actividad jQuery - Manipulación DOM</title>

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">

        <!-- CSS personalizado -->
        <link rel="stylesheet" href="./assets/css/styles.css">
    </head>
    <body>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-body">
                            <h1 class="card-title text-center mb-4">Lista de
                                Elementos</h1>

                            <ul id="miLista" class="list-group mb-3">
                                <li class="list-group-item">Elemento 1</li>
                                <li class="list-group-item">Elemento 2</li>
                                <li class="list-group-item">Elemento 3</li>
                            </ul>

                            <button id="agregarElemento"
                                class="btn btn-primary w-100 mb-2">
                                Agregar Elemento
                            </button>

                            <!-- Botón para ocultar/mostrar lista (Punto 4) -->
                            <button id="toggleLista"
                                class="btn btn-secondary w-100">
                                Ocultar lista
                            </button>

                            <p class="info text-center text-muted mt-3 mb-0">
                                Haz click en el botón para agregar un nuevo
                                elemento a la lista
                            </p>
                        </div>
                    </div>

                    <!-- Sección de Plugins (Punto 5) -->
                    <div class="card shadow mt-4">
                        <div class="card-body">
                            <h2 class="card-title text-center mb-4">Carousel
                                Bootstrap-jQuery</h2>

                            <!-- Carousel de Bootstrap -->
                            <div id="carouselExample" class="carousel slide"
                                data-bs-ride="carousel">
                                <div class="carousel-inner">
                                    <div class="carousel-item active">
                                        <img
                                            src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800&h=400&fit=crop"
                                            class="d-block w-100"
                                            alt="Programación">
                                        <div
                                            class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
                                            <h5>JavaScript</h5>
                                            <p>Lenguaje de programación web</p>
                                        </div>
                                    </div>
                                    <div class="carousel-item">
                                        <img
                                            src="https://images.unsplash.com/photo-1593720213428-28a5b9e94613?w=800&h=400&fit=crop"
                                            class="d-block w-100" alt="Python">
                                        <div
                                            class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
                                            <h5>Desarrollo Web</h5>
                                            <p>HTML, CSS y JavaScript</p>
                                        </div>
                                    </div>
                                    <div class="carousel-item">
                                        <img
                                            src="https://images.unsplash.com/photo-1516116216624-53e697fedbea?w=800&h=400&fit=crop"
                                            class="d-block w-100" alt="Código">
                                        <div
                                            class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
                                            <h5>jQuery</h5>
                                            <p>Biblioteca de JavaScript</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- Indicadores -->
                                <div class="carousel-indicators">
                                    <button type="button"
                                        data-bs-target="#carouselExample"
                                        data-bs-slide-to="0"
                                        class="active"></button>
                                    <button type="button"
                                        data-bs-target="#carouselExample"
                                        data-bs-slide-to="1"></button>
                                    <button type="button"
                                        data-bs-target="#carouselExample"
                                        data-bs-slide-to="2"></button>
                                </div>

                                <!-- Controles -->
                                <button class="carousel-control-prev"
                                    type="button"
                                    data-bs-target="#carouselExample"
                                    data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon"
                                        aria-hidden="true"></span>
                                    <span
                                        class="visually-hidden">Anterior</span>
                                </button>
                                <button class="carousel-control-next"
                                    type="button"
                                    data-bs-target="#carouselExample"
                                    data-bs-slide="next">
                                    <span class="carousel-control-next-icon"
                                        aria-hidden="true"></span>
                                    <span
                                        class="visually-hidden">Siguiente</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- jQuery CDN -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
            integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

        <!-- Bootstrap JS -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Tu JavaScript -->
        <script src="./assets/js/main.js"></script>

    </body>
</html>
